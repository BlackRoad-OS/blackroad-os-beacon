[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
numReplicas = 1
healthcheckPath = "/health"
healthcheckTimeout = 10
healthcheckInterval = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Resource limits (prevent over-allocation)
[deploy.resources]
memory = "512Mi"
cpu = "0.5"

[[services]]
name = "blackroad-os-beacon"

[services.env]
PORT = "8080"
NODE_ENV = "production"
REPO_NAME = "blackroad-os-beacon"
ORG_NAME = "BlackRoad-OS"
