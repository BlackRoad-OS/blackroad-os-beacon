name: beacon-ci

on:
  push:
    branches: ["main", "feat/beacon-sig-service"]
  pull_request:
    branches: ["main", "feat/beacon-sig-service"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@f43a3398dc5d8737c2dbc7bf8ad6b50918d7a3d4

      - name: Setup Node
        uses: actions/setup-node@b829d2ab59ffb3738572edf3c6dbd9bfebc477f1
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Validate SIG schemas
        run: npm run validate:sig
