# Alerting configuration
alerting:
  enabled: true
  channels:
    - type: slack
      webhook: "${SLACK_WEBHOOK_URL}"
      channel: "#alerts"
    - type: discord
      webhook: "${DISCORD_WEBHOOK_URL}"
      channel: "alerts"
    - type: email
      recipients:
        - "ops@blackroad.io"
  thresholds:
    unhealthy_count: 3
    latency_ms: 5000

# Health check configuration
health_check:
  interval_seconds: 60
  timeout_seconds: 10
  retry_count: 3
  parallel_checks: 10
