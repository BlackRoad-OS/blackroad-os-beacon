version: '3.9'

services:
  beacon:
    build:
      context: .
      dockerfile: Dockerfile
    image: blackroad/beacon:latest
    container_name: blackroad-beacon
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - BEACON_SERVICES_CONFIG_PATH=/app/config/services.yaml
      - DEPLOY_LOG_PATH=/app/data/deploy-log.jsonl
    volumes:
      - beacon-data:/app/data
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - blackroad-net
    labels:
      - "com.blackroad.service=beacon"
      - "com.blackroad.version=1.0.0"

  # Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    container_name: blackroad-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blackroad-net

  # PostgreSQL for persistent data
  postgres:
    image: postgres:16-alpine
    container_name: blackroad-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=blackroad
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-blackroad_secret}
      - POSTGRES_DB=beacon
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blackroad -d beacon"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blackroad-net

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: blackroad-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - beacon
    networks:
      - blackroad-net

  # Prometheus metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: blackroad-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - blackroad-net

  # Grafana dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: blackroad-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - blackroad-net

volumes:
  beacon-data:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  blackroad-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
